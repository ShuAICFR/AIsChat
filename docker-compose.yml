services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai_group_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ai_chat
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ai_group_chat
    ports:
      - "5432:5432"
    volumes:
      - ${HOST_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ai_group_backend
    ports:
      - "5228:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_chat:${DB_PASSWORD}@postgres:5432/ai_group_chat
      DATABASE_URL_SYNC: postgresql://ai_chat:${DB_PASSWORD}@postgres:5432/ai_group_chat
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      - ${HOST_DATA_DIR:-./data}/uploads:/app/uploads
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: ai_group_frontend
    ports:
      - "5227:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./docs:/app/public/docs
    depends_on:
      - backend
    command: yarn dev -- --host 0.0.0.0
